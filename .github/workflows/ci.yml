name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Вывод версии Node.js
        run: |
          echo "=== Версия Node.js ==="
          node --version
          echo "=== Версия npm ==="
          npm --version

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Установка зависимостей
        run: npm install
      - name: Запуск тестов
        run: node test.js
